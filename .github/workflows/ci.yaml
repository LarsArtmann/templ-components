name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: |
          golangci-lint run --timeout=5m \
            ./display/... ./errorpage/... ./feedback/... ./forms/... \
            ./htmx/... ./icons/... ./integration/... ./internal/... \
            ./layout/... ./navigation/... ./recipes/... ./utils/...

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      GOEXPERIMENT: jsonv2
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26"

      - name: Install templ
        run: go install github.com/a-h/templ/cmd/templ@v0.3.1020

      - name: Generate templ files
        run: templ generate

      - name: Verify all *_templ.go files are tracked
        run: |
          EXIT_CODE=0
          for templ_file in $(find . -name '*.templ' -not -path './vendor/*'); do
            gen_file="${templ_file%.templ}_templ.go"
            if ! git ls-files --error-unmatch "$gen_file" >/dev/null 2>&1; then
              echo "::error::$gen_file is not tracked. Generated files MUST be committed."
              echo "::error::Check .gitignore for conflicting *_templ.go rules."
              EXIT_CODE=1
            fi
          done
          exit $EXIT_CODE

      - name: Go mod tidy
        run: go mod tidy

      - name: Verify no untracked changes
        run: git diff --exit-code

      - name: Go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out $(go list ./... | grep -v examples)

      - name: Docs-health drift guard
        run: go test ./utils/... -run TestDocsCountDrift

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 70" | bc -l)" -eq 1 ]; then
            echo "Coverage ${COVERAGE}% is below 70% threshold"
            exit 1
          fi

      - name: Build examples
        run: go build ./examples/...

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.out
