name: Website

on:
  push:
    branches: [master]
    paths:
      - website/**
      - examples/demo/**
      - .github/workflows/website.yml
  pull_request:
    branches: [master]
    paths:
      - website/**
      - examples/demo/**
      - .github/workflows/website.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-website:
    name: Build Website
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm install

      - name: npm audit
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - run: npx astro check
        continue-on-error: true

      - run: npm run build

      - name: HTML Validation
        run: npx html-validate --config .htmlvalidate.json "dist/**/*.html"
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist/

  deploy-website:
    name: Deploy Website + Demo
    needs: build-website
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/download-artifact@v4
        with:
          name: website-dist
          path: website/dist/

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TEMPLCOMPONENTS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push demo image
        run: |
          docker build -t us-central1-docker.pkg.dev/lars-software/templcomponents/demo:latest \
            -f examples/demo/Dockerfile .
          docker push us-central1-docker.pkg.dev/lars-software/templcomponents/demo:latest

      - name: Deploy demo to Cloud Run
        run: |
          gcloud run deploy templcomponents-demo \
            --image=us-central1-docker.pkg.dev/lars-software/templcomponents/demo:latest \
            --region=us-central1 \
            --project=lars-software \
            --port=8080 \
            --min-instances=0 \
            --max-instances=1 \
            --memory=256Mi \
            --cpu=1 \
            --timeout=60 \
            --ingress=all \
            --allow-unauthenticated

      - name: Deploy to Firebase Hosting
        working-directory: website
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting:templcomponents --project lars-software
