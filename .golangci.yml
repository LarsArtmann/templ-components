version: "2"
run:
  timeout: 5m
  go: 1.26.4
  build-tags:
    - goexperiment.arenas
    - goexperiment.goroutineleakprofile
    - goexperiment.jsonv2
    - goexperiment.runtimesecret
    - goexperiment.simd
  allow-parallel-runners: true
  allow-serial-runners: true
  issues-exit-code: 1
output:
  formats: {}
linters:
  enable:
    - bodyclose
    - contextcheck
    - copyloopvar
    - cyclop
    - dupl
    - durationcheck
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - forcetypeassert
    - funlen
    - ginkgolinter
    - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - gosmopolitan
    - govet
    - ineffassign
    - interfacebloat
    - intrange
    - loggercheck
    - maintidx
    - mirror
    - misspell
    - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - paralleltest
    - perfsprint
    - prealloc
    - predeclared
    - protogetter
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - testifylint
    - thelper
    - unconvert
    - unparam
    - unused
    - usetesting
    - wastedassign
    - wrapcheck
    - zerologlint
  settings:
    cyclop:
      max-complexity: 12
    exhaustruct:
      exclude:
        - os/exec.Cmd
    funlen:
      lines: 60
      statements: 50
    ginkgolinter:
      forbid-focus-container: true
      forbid-spec-pollution: true
    gocritic:
      disabled-checks:
        - ifElseChain
    revive:
      rules:
        - disabled: true
          name: exported
        - disabled: true
          name: package-comments
    testifylint:
      disable:
        - go-require
      enable-all: true
  exclusions:
    generated: lax
    rules:
      - path: _test\.go$
        linters:
          - exhaustruct
          - funlen
          - goconst
      - path: _test\.go
        linters:
          - exhaustruct
          - testpackage
          - gochecknoglobals
          - funlen
          - cyclop
          - goconst
      - path: _test\.go
        text: unused
        linters:
          - unused
    paths:
      - \.gen\.go$
      - _templ\.go$
      - vendor/
      - examples/
formatters:
  enable:
    - gci
    - goimports
    - gofumpt
    - golines
  settings:
    golines:
      max-len: 120
  exclusions:
    generated: lax
    paths:
      - _templ\.go$
      - _templ\\.go$
issues:
  max-issues-per-linter: 50
  max-same-issues: 10
